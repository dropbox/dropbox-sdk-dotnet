name: Spec Update
on:
  workflow_dispatch:
  repository_dispatch:
    types: [spec_update]

jobs:
  Update:
    runs-on: ubuntu-latest
    permissions:  # required for OIDC authentication
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::082972943155:role/oidc-github-dropbox-dropbox-sdk-dotnet-repo
          aws-region: us-west-2
      - name: Get spec-update token from AWS Secrets Manager
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: |
            SPEC_UPDATE_TOKEN,spec-update-token-dropbox-sdk-dotnet
          parse-json-secrets: false
      - name: Setup Python environment
        uses: actions/setup-python@v6.3.0
        with:
          python-version: '3.11'
      - name: Get current time
        uses: 1466587594/get-current-time@v2
        id: current-time
        with:
          format: YYYY_MM_DD
          utcOffset: "-08:00"
      - name: Install Requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r generator/requirements-dev.txt
      - name: Update Modules
        run: |
          git submodule init
          git submodule update --remote --recursive
      - name: Generate Branch Name
        id: git-branch
        run: |
          echo "::set-output name=branch::spec_update_${{ steps.current-time.outputs.formattedTime }}"
      - name: Generate Num Diffs
        id: git-diff-num
        run: |
          diffs=$(git diff --submodule spec | grep ">" | wc -l)
          echo "Number of Spec diffs: $diffs"
          echo "::set-output name=num-diff::$diffs"
      - name: Generate Diff
        id: git-diff
        run: |
          cd spec
          gitdiff=$(git log -n ${{ steps.git-diff-num.outputs.num-diff }} --pretty="format:%n %H %n%n %b")
          commit="Automated Spec Update $gitdiff"
          commit="${commit//'%'/'%25'}"
          commit="${commit//$'\n'/'%0A'}"
          commit="${commit//$'\r'/'%0D'}"
          echo "Commit Message: $commit"
          echo "::set-output name=commit::$commit"
      - name: Generate New Routes
        run: |
          python generator/generate_routes.py
          git add dropbox-sdk-dotnet/Dropbox.Api/Generated
          git add spec
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8.1.1
        if: steps.git-diff-num.outputs.num-diff != 0
        with:
          token: ${{ env.SPEC_UPDATE_TOKEN }}
          commit-message: |
            ${{ steps.git-diff.outputs.commit}}
          branch: ${{ steps.git-branch.outputs.branch }}
          delete-branch: true
          title: 'Automated Spec Update'
          body: |
            ${{ steps.git-diff.outputs.commit}}
          base: 'main'
          team-reviewers: |
            owners
            maintainers
          draft: false
